name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: unzip project.zip
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install && npx next build
      - uses: actions/setup-java@v4
        with: { distribution: 'zulu', java-version: '17' }
      - run: npx cap init "FireDash" "com.firedash" --web-dir=out && npx cap add android && npx cap sync android
      - run: cd android && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with: { name: apk, path: android/app/build/outputs/apk/debug/app-debug.apk }
